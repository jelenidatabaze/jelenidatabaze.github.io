<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Databáze zvěře Kladcká</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      color:#222;
      background:#000;
    }

    header{
      width:100%;
      background:#1f4d2e;
      color:white;
      padding:20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
    }

    .right{
      display:flex;
      align-items:center;
      gap:15px;
    }

    .email-box{
      background:white;
      color:black;
      padding:10px 15px;
      border-radius:8px;
      min-width:220px;
    }

    .email-box a{
      color:black;
      text-decoration:none;
    }

    .logo-box{
      width:60px;
      height:60px;
      background:white;
      border-radius:10px;
      display:flex;
      justify-content:center;
      align-items:center;
      color:#1f4d2e;
      font-weight:bold;
    }

    .main{
      display:flex;
      min-height:50vh;
    }

    .left-side,
    .right-side{
      width:50%;
      padding:50px 30px;
      color:white;
      position:relative;
      overflow:hidden;
    }

    .left-side::before,
    .right-side::before{
      content:"";
      position:absolute;
      inset:0;
      background-size:cover;
      background-position:center;
      filter:brightness(0.5);
      transform:scale(1.05);
    }

    .left-side::before{
      background-image:url("https://media.istockphoto.com/id/182199370/photo/young-hart-red-deer-stag-cervus-elaphus-profile.jpg");
    }

    .right-side::before{
      background-image:url("https://ceskehory.goldengate.cz/wp-content/uploads/2024/04/Jelen-evropske.jpg");
    }

    .left-side h2,
    .left-side p,
    .right-side h2,
    .right-side p{
      position:relative;
      z-index:1;
    }

    h2{
      margin-bottom:20px;
      font-size:32px;
    }

    p{
      font-size:18px;
      line-height:1.6;
    }

    .bottom{
      width:100%;
      padding:30px;
      background:#111;
      text-align:center;
      border-top:3px solid #1f4d2e;
    }

    .btn{
      background:#1f4d2e;
      color:white;
      border:none;
      padding:15px 35px;
      font-size:18px;
      border-radius:10px;
      cursor:pointer;
      margin-top:10px;
    }

    .form-box{
      display:none;
      margin-top:20px;
      background:#222;
      padding:20px;
      border-radius:10px;
      color:white;
      position:relative;
      z-index:2;
    }

    .form-box input, .form-box select{
      width:100%;
      padding:10px;
      margin:5px 0;
      border-radius:8px;
      border:none;
    }

    .list{
      margin-top:20px;
      position:relative;
      z-index:2;
    }

    .item{
      background:#1f4d2e;
      margin:10px 0;
      padding:10px;
      border-radius:8px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .delete{
      background:red;
      border:none;
      color:white;
      padding:5px 10px;
      border-radius:6px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">Databáze zvěře Kladcká</div>

  <div class="right">
    <div class="email-box">
      <a href="mailto:jirkaolko@gmail.com">jirkaolko@gmail.com</a>
    </div>
    <div class="logo-box">LOGO</div>
  </div>
</header>

<section class="main">

  <div class="left-side">
    <h2>Bodování zvěře</h2>
    <p>Přehled trofejí a bodování.</p>

    <div class="list" id="list"></div>
  </div>

  <div class="right-side">
    <h2>Databáze</h2>

    <div class="form-box" id="formBox">
      <select id="type">
        <option>Jelen</option>
        <option>Srnec</option>
        <option>Daněk</option>
      </select>

      <input id="name" placeholder="Jméno / označení">
      <input id="points" type="number" placeholder="Počet bodů">

      <button class="btn" onclick="save()">Uložit</button>
    </div>
  </div>

</section>

<section class="bottom">
  <button class="btn" onclick="openForm()">Přidat</button>
</section>

<script>
document.addEventListener("DOMContentLoaded", function () {

  let data = JSON.parse(localStorage.getItem("zver")) || [];

  const form = document.getElementById("formBox");
  const list = document.getElementById("list");

  window.openForm = function () {
    form.style.display = (form.style.display === "block") ? "none" : "block";
  }

  window.save = function () {
    const type = document.getElementById("type").value;
    const name = document.getElementById("name").value;
    const points = parseInt(document.getElementById("points").value);

    if (!name || !points) return;

    data.push({ type, name, points });
    update();

    document.getElementById("name").value = "";
    document.getElementById("points").value = "";
  }

  window.deleteItem = function (index) {
    data.splice(index, 1);
    update();
  }

  function update() {
    data.sort((a, b) => b.points - a.points);
    localStorage.setItem("zver", JSON.stringify(data));

    list.innerHTML = "";

    data.forEach((item, index) => {
      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <div>
          <b>${item.type}</b> – ${item.name} – ${item.points} bodů
        </div>
        <button class="delete" onclick="deleteItem(${index})">X</button>
      `;

      list.appendChild(div);
    });
  }

  update();
});
</script>

</body>
</html>
