<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Databáze zvěře Kladcká</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#000;
  color:#fff;
}

header{
  background:#1f4d2e;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:28px;
  font-weight:bold;
}

.right{
  display:flex;
  gap:15px;
  align-items:center;
}

.email-box{
  background:#fff;
  color:#000;
  padding:10px;
  border-radius:8px;
}

.logo-box{
  width:60px;
  height:60px;
  background:#fff;
  color:#1f4d2e;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:10px;
  font-weight:bold;
}

.main{
  display:flex;
  min-height:60vh;
}

.left-side, .right-side{
  width:50%;
  padding:40px;
  position:relative;
}

.left-side::before, .right-side::before{
  content:"";
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  filter:brightness(0.4);
  z-index:0;
}

.left-side::before{
  background-image:url("https://media.istockphoto.com/id/182199370/photo/young-hart-red-deer-stag.jpg");
}

.right-side::before{
  background-image:url("https://ceskehory.goldengate.cz/wp-content/uploads/2024/04/Jelen-evropske.jpg");
}

.content{
  position:relative;
  z-index:1;
}

h2{
  margin-bottom:10px;
}

.list{
  margin-top:20px;
}

.item{
  background:#1f4d2e;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
}

.delete{
  background:red;
  border:none;
  color:#fff;
  padding:5px 10px;
  border-radius:6px;
  cursor:pointer;
}

.bottom{
  background:#111;
  padding:20px;
  text-align:center;
}

.btn{
  background:#1f4d2e;
  color:#fff;
  border:none;
  padding:15px 30px;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
}

.form{
  display:none;
  background:#222;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}

input, select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}
</style>
</head>

<body>

<header>
  <div class="logo">Databáze zvěře Kladcká</div>

  <div class="right">
    <div class="email-box">jirkaolko@gmail.com</div>
    <div class="logo-box">LOGO</div>
  </div>
</header>

<section class="main">

  <div class="left-side">
    <div class="content">
      <h2>Databáze zvěře</h2>
      <p>Evidence trofejí a bodování</p>

      <div class="list" id="list"></div>
    </div>
  </div>

  <div class="right-side">
    <div class="content">
      <h2>Přidání záznamu</h2>

      <div class="form" id="form">
        <select id="type">
          <option>Jelen</option>
          <option>Srnec</option>
          <option>Daněk</option>
        </select>

        <input id="name" placeholder="Jméno / označení">
        <input id="points" type="number" placeholder="Body">

        <button class="btn" id="saveBtn">Uložit</button>
      </div>
    </div>
  </div>

</section>

<div class="bottom">
  <button class="btn" id="addBtn">Přidat</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  let data = JSON.parse(localStorage.getItem("zver")) || [];

  const list = document.getElementById("list");
  const form = document.getElementById("form");
  const addBtn = document.getElementById("addBtn");
  const saveBtn = document.getElementById("saveBtn");

  // otevření formuláře
  addBtn.addEventListener("click", () => {
    form.style.display = form.style.display === "block" ? "none" : "block";
  });

  // uložení
  saveBtn.addEventListener("click", () => {

    const type = document.getElementById("type").value;
    const name = document.getElementById("name").value;
    const points = Number(document.getElementById("points").value);

    if (!name || !points) return;

    data.push({ type, name, points });

    document.getElementById("name").value = "";
    document.getElementById("points").value = "";

    render();
  });

  // mazání
  window.deleteItem = (i) => {
    data.splice(i, 1);
    render();
  };

  function render(){
    data.sort((a,b)=>b.points - a.points);

    localStorage.setItem("zver", JSON.stringify(data));

    list.innerHTML = "";

    data.forEach((x,i)=>{
      list.innerHTML += `
        <div class="item">
          <div><b>${x.type}</b> – ${x.name} – ${x.points} bodů</div>
          <button class="delete" onclick="deleteItem(${i})">X</button>
        </div>
      `;
    });
  }

  render();

});
</script>

</body>
</html>
