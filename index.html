<script>
document.addEventListener("DOMContentLoaded", () => {
    let data = JSON.parse(localStorage.getItem("zver")) || [];

    const list = document.getElementById("list");

    window.deleteItem = (i) => {
        data.splice(i, 1);
        render();
    };

    function render() {
        data.sort((a, b) => b.points - a.points);

        localStorage.setItem("zver", JSON.stringify(data));

        list.innerHTML = "";

        data.forEach((x, i) => {
            list.innerHTML += `
                <div class="item">
                    ${x.image ? `<img src="${x.image}" alt="">` : ""}

                    <div>
                        <b>${x.type}</b><br>
                        ${x.name}<br>
                        ${x.points} bodů
                    </div>

                    <button class="delete" onclick="deleteItem(${i})">X</button>
                </div>
            `;
        });
    }

    render();
});
</script>
