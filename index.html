<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Databáze zvěře Kladcká</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      color:#222;

      /* animované pozadí */
      background: 
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url("https://ceskehory.goldengate.cz/wp-content/uploads/2024/04/Jelen-evropske.jpg");

      background-size: cover;
      background-position: center;
      background-attachment: fixed;

      animation: bgZoom 20s ease-in-out infinite alternate;
    }

    @keyframes bgZoom{
      0%{ background-size: 100%; }
      100%{ background-size: 110%; }
    }

    /* HORNÍ PRUH */
    header{
      width:100%;
      background:#1f4d2e;
      color:white;
      padding:20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
    }

    .right{
      display:flex;
      align-items:center;
      gap:15px;
    }

    .email-box{
      background:white;
      color:black;
      padding:10px 15px;
      border-radius:8px;
      min-width:220px;
    }

    .email-box a{
      color:black;
      text-decoration:none;
    }

    .logo-box{
      width:60px;
      height:60px;
      background:white;
      border-radius:10px;
      display:flex;
      justify-content:center;
      align-items:center;
      color:#1f4d2e;
      font-weight:bold;
    }

    /* HLAVNÍ ČÁST */
    .main{
      display:flex;
      min-height:50vh;
    }

    .left-side,
    .right-side{
      width:50%;
      padding:50px 30px;
      color:white;
      animation: fadeIn 1.5s ease;
    }

    @keyframes fadeIn{
      from{ opacity:0; transform: translateY(20px); }
      to{ opacity:1; transform: translateY(0); }
    }

    .left-side{
      background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
        url("https://media.istockphoto.com/id/182199370/photo/young-hart-red-deer-stag-cervus-elaphus-profile.jpg?s=170667a&w=0&k=20&c=G4nxM2tFa_Hmzwqrtc7NgE0-GoukxmA5em7zBVj59To=");
      background-size: cover;
      background-position: center;
    }

    .right-side{
      background: rgba(0,0,0,0.35);
    }

    h2{
      margin-bottom:20px;
      font-size:32px;
    }

    p{
      font-size:18px;
      line-height:1.6;
    }

    /* SPODNÍ ČÁST */
    .bottom{
      width:100%;
      padding:30px;
      background:rgba(0,0,0,0.5);
      text-align:center;
      border-top:3px solid #1f4d2e;
    }

    .btn{
      background:#1f4d2e;
      color:white;
      border:none;
      padding:15px 35px;
      font-size:18px;
      border-radius:10px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#163821;
      transform: scale(1.05);
    }

    /* MOBIL */
    @media(max-width: 800px){

      header{
        flex-direction:column;
        gap:20px;
        text-align:center;
      }

      .right{
        flex-direction:column;
      }

      .main{
        flex-direction:column;
      }

      .left-side,
      .right-side{
        width:100%;
      }

      h2{
        font-size:26px;
      }

      p{
        font-size:16px;
      }

      .email-box{
        min-width:unset;
        width:100%;
      }
    }

  </style>
</head>

<body>

  <header>

    <div class="logo">
      Databáze zvěře Kladcká
    </div>

    <div class="right">

      <div class="email-box">
        <a href="mailto:jirkaolko@gmail.com">
          jirkaolko@gmail.com
        </a>
      </div>

      <div class="logo-box">
        LOGO
      </div>

    </div>

  </header>

  <section class="main">

    <div class="left-side">
      <h2>Bodování jelenů</h2>
      <p>
        Přehled bodování jelenů, statistiky,
        trofeje a hodnocení zvěře.
      </p>
    </div>

    <div class="right-side">
      <h2>Databáze</h2>
      <p>
        Evidence zvěře, informace o úlovcích,
        fotografie a další údaje.
      </p>
    </div>

  </section>

  <section class="bottom">
    <button class="btn">Přidat</button>
  </section>

</body>
</html>
