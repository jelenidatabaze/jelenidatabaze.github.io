<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Databáze zvěře Kladská</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
      color:#222;
    }

    /* HORNÍ PRUH */
    header{
      width:100%;
      background:#1f4d2e;
      color:white;
      padding:20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
    }

    .right{
      display:flex;
      align-items:center;
      gap:15px;
    }

    .email-box{
      background:white;
      color:black;
      padding:10px 15px;
      border-radius:8px;
      min-width:220px;
    }

    .logo-box{
      width:60px;
      height:60px;
      background:white;
      border-radius:10px;
      display:flex;
      justify-content:center;
      align-items:center;
      color:#1f4d2e;
      font-weight:bold;
    }

    /* HLAVNÍ ČÁST */
    .main{
      display:flex;
      min-height:50vh;
    }

    .left-side,
    .right-side{
      width:50%;
      padding:50px 30px;
    }

    .left-side{
      background:#dfe9dc;
    }

    .right-side{
      background:#ffffff;
    }

    h2{
      margin-bottom:20px;
      font-size:32px;
    }

    p{
      font-size:18px;
      line-height:1.6;
    }

    /* LINKA + TLAČÍTKO */
    .bottom{
      width:100%;
      padding:30px;
      background:#e8e8e8;
      text-align:center;
      border-top:3px solid #1f4d2e;
    }

    .btn{
      background:#1f4d2e;
      color:white;
      border:none;
      padding:15px 35px;
      font-size:18px;
      border-radius:10px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#163821;
    }

    /* MOBIL */
    @media(max-width: 800px){

      header{
        flex-direction:column;
        gap:20px;
        text-align:center;
      }

      .right{
        flex-direction:column;
      }

      .main{
        flex-direction:column;
      }

      .left-side,
      .right-side{
        width:100%;
      }

      h2{
        font-size:26px;
      }

      p{
        font-size:16px;
      }

      .email-box{
        min-width:unset;
        width:100%;
      }
    }

  </style>
</head>

<body>

  <!-- HORNÍ PRUH -->
  <header>

    <div class="logo">
      Databáze zvěře Kladská
    </div>

    <div class="right">

      <div class="email-box">
        email@kladcka.cz
      </div>

      <div class="logo-box">
        LOGO
      </div>

    </div>

  </header>

  <!-- HLAVNÍ ČÁST -->
  <section class="main">

    <div class="left-side">
      <h2>Bodování jelenů</h2>

      <p>
        Přehled bodování zvěře, statistiky,
        trofeje a hodnocení zvěře.
      </p>
    </div>

    <div class="right-side">
      <h2>Databáze</h2>

      <p>
        Evidence zvěře, informace o úlovcích,
        fotografie a další údaje.
      </p>
    </div>

  </section>

  <!-- SPODEK -->
  <section class="bottom">

    <button class="btn">
      Přidat
    </button>

  </section>

</body>
</html>
